<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"> 
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pedidos App</title>
  <link rel="stylesheet" href="styles.css">


  <style>
    /* Fondo semitransparente para el modal */
    .modal {
      display: none; /* Oculto por defecto */
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.5);
    }

    /* Caja centrada */
    .modal-content {
      background-color: #fff;
      margin: 10% auto;
      padding: 20px;
      border-radius: 8px;
      width: 300px;
      text-align: center;
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
    }

    /* Botón de cerrar */
    .close {
      color: #aaa;
      float: right;
      font-size: 24px;
      font-weight: bold;
      cursor: pointer;
    }
    .close:hover {
      color: #000;
    }

    /* Estilo del input y botón */
    input[type="password"] {
      width: 90%;
      padding: 8px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    .modal-content button {
      background-color: #4CAF50;
      color: white;
      padding: 8px 16px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      margin-top: 10px;
    }
    .modal-content button:hover {
      background-color: #45a049;
    }
  </style>
</head>
<body>
  
  <!-- Barra superior -->
  <div class="top-bar">
    <!-- Logo con acceso al panel admin -->
    <div class="logo">
      <a href="#" onclick="mostrarLogin(event)">
        <img src="logo.jpg" alt="Logo" />
      </a>
    </div>

    <!-- Botón de consultar pedidos -->
    <div class="pedidos-btn">
      <button class="btn-pedidos" onclick="window.location.href='cliente.html'">
        Consultar mis Pedidos
      </button>
    </div>
  </div>

  <!-- Modal de login -->
  <div id="loginModal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="cerrarLogin()">&times;</span>
      <h2>Acceso al Panel</h2>
      <form onsubmit="accesoAdmin(event)">
        <label for="clave">Ingrese la clave:</label>
        <input type="password" id="clave" required>
        <button type="submit">Acceder</button>
      </form>
    </div>
  </div>

  <div class="pedido">
    <h1>Nuevo Pedido</h1>
  </div>

  <div class="main-container">
    <!-- Columna izquierda -->
    <div class="left-column">
      <form id="orderForm">
        <label>Nombre Vendedor:</label>
        <input type="text" id="sellerName" required>

        <label>Nombre Cliente:</label>
        <input type="text" id="clientName" required>

        <label>Localidad:</label>
        <input type="text" id="clientLocalidad" required>

        <label>Fecha de Retiro:</label>
        <input type="date" id="clientRetiro" required>
      </form>

      <h2>Selecciona tu producto</h2>

      <label for="huevo11">Huevo n°11 - $8000:</label>
      <select id="huevo11">
        <option value="">-- Elegir variante --</option>
        <option value="Blanco">Blanco</option>
        <option value="Negro">Negro</option>
         <option value="Negro Con Leche">Negro Con Leche</option>
         <option value="Mixto Blanco/Negro">Mixto (Blanco/Negro)</option>
         <option value="Mixto Blanco/Negro con leche">Mixto (Blanco/Negro con leche)</option>
         <option value="Mixto Negro/Negro con leche">Mixto (Negro/Negro con leche)</option>
       
      </select>

      <br><br>

      <label for="huevo14">Huevo n°14 - $13000:</label>
      <select id="huevo14">
        <option value="">-- Elegir variante --</option>
        <option value="Blanco">Blanco</option>
        <option value="Negro">Negro</option>
       <option value="Negro Con Leche">Negro Con Leche</option>
         <option value="Mixto Blanco/Negro">Mixto (Blanco/Negro)</option>
         <option value="Mixto Blanco/Negro con leche">Mixto (Blanco/Negro con leche)</option>
         <option value="Mixto Negro/Negro con leche">Mixto (Negro/Negro con leche)</option>
      </select>

      <br><br>

      <label for="huevo16">Huevo n°16 - $19000:</label>
      <select id="huevo16">
        <option value="">-- Elegir variante --</option>
        <option value="Blanco">Blanco</option>
        <option value="Negro">Negro</option>
        <option value="Negro Con Leche">Negro Con Leche</option>
        <option value="Mixto Blanco/Negro">Mixto (Blanco/Negro)</option>
        <option value="Mixto Blanco/Negro con leche">Mixto (Blanco/Negro con leche)</option>
        <option value="Mixto Negro/Negro con leche">Mixto (Negro/Negro con leche)</option>
      </select>
      
      <br><br>

      <label for="huevo25">Huevo n°25- $45000:</label>
      <select id="huevo25">
        <option value="">-- Elegir variante --</option>
        <option value="Blanco">Blanco</option>
        <option value="Negro">Negro</option>
        <option value="Negro Con Leche">Negro Con Leche</option>
        <option value="Mixto Blanco/Negro">Mixto (Blanco/Negro)</option>
        <option value="Mixto Blanco/Negro con leche">Mixto (Blanco/Negro con leche)</option>
        <option value="Mixto Negro/Negro con leche">Mixto (Negro/Negro con leche)</option>
      </select>

      <br><br>

      <label for="huevo30">Huevo n°30 - $75000:</label>
      <select id="huevo30">
        <option value="">-- Elegir variante --</option>
        <option value="Blanco">Blanco</option>
        <option value="Negro">Negro</option>
        <option value="Negro Con Leche">Negro Con Leche</option>
        <option value="Mixto Blanco/Negro">Mixto (Blanco/Negro)</option>
        <option value="Mixto Blanco/Negro con leche">Mixto (Blanco/Negro con leche)</option>
        <option value="Mixto Negro/Negro con leche">Mixto (Negro/Negro con leche)</option>
      </select>

      <br><br>

      
      <button type="button" onclick="addSelectedProducts()">Agregar al carrito</button>
    </div>

    <!-- Columna derecha -->
    <div class="right-column">
      <h2>Carrito</h2>
      <table>
        <thead>
          <tr>
            <th>Producto</th>
            <th>Precio</th>
            <th>Cantidad</th>
            <th>Acción</th>
          </tr>
        </thead>
        <tbody id="cartTable"></tbody>
      </table>
      <p id="total">Total: $0</p>
      <button onclick="saveOrder()">Guardar Pedido</button>
    </div>
  </div>

  <script>
    function mostrarLogin(event) {
      event.preventDefault();
      document.getElementById("loginModal").style.display = "block";
    }

    function cerrarLogin() {
      document.getElementById("loginModal").style.display = "none";
    }

    function accesoAdmin(event) {
      event.preventDefault();
      const clave = document.getElementById("clave").value;
      if (clave === "Bolivar108174") {
        window.location.href = "admin.html";
      } else {
        alert("Clave incorrecta. Acceso denegado.");
      }
    }

    // Cerrar modal si se hace clic fuera de la caja
    window.onclick = function(event) {
      const modal = document.getElementById("loginModal");
      if (event.target === modal) {
        modal.style.display = "none";
      }
    }
  </script>

  <script src="script.js"></script>
</body>
</html>
