<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Pedidos App</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  
  <!-- Barra superior -->
  <div class="top-bar">
  
    <!-- Logo con acceso al panel admin -->
<div class="logo">
  <a href="#" onclick="accesoAdmin(event)">
    <img src="logo.jpg" alt="Logo" />
  </a>
</div>

<script>
  function accesoAdmin(event) {
    event.preventDefault(); // Evita que se abra el enlace directamente
    const clave = prompt("Ingrese la clave para acceder al panel:");
    if (clave === "Bolivar108174") {
      window.location.href = "admin.html";
    } else {
      alert("Clave incorrecta. Acceso denegado.");
    }
  }
</script>

    <!-- Botón de consultar pedidos -->
    <div class="pedidos-btn">
      <button class="btn-pedidos" onclick="window.location.href='cliente.html'">
        Consultar mis Pedidos
      </button>
    </div>
  </div>

  <div class="pedido">
    <h1>Nuevo Pedido</h1>
  </div>

  <div class="main-container">
    <!-- Columna izquierda: Datos del pedido + Productos -->
    <div class="left-column">
      <!-- Datos del pedido -->
      <form id="orderForm">
        <label>Nombre Vendedor:</label>
        <input type="text" id="sellerName" required>

        <label>Nombre Cliente:</label>
        <input type="text" id="clientName" required>

        <label>Localidad:</label>
        <input type="text" id="clientLocalidad" required>

        <label>Fecha de Retiro:</label>
        <input type="date" id="clientRetiro" required>
      </form>

      <!-- Productos -->
      <h2>Productos</h2>
      <div id="products"></div>
    </div>

    <!-- Columna derecha: Carrito -->
    <div class="right-column">
      <h2>Carrito</h2>
      <table>
        <thead>
          <tr>
            <th>Producto</th>
            <th>Precio</th>
            <th>Cantidad</th>
            <th>Acción</th>
          </tr>
        </thead>
        <tbody id="cartTable"></tbody>
      </table>
      <p id="total">Total: $0</p>

      <!-- Guardar pedido -->
      <button onclick="saveOrder()">Guardar Pedido</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
